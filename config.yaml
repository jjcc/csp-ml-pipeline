# ============================================================
# CSP ML Pipeline — Unified Configuration
# ============================================================
#
# When you have new option data, update only these fields in the `dataset` block:
#
#   dataset.cutoff_date       — last expiry date in the data + a few days buffer
#                               (trades with expirationDate > cutoff are excluded as unlabeled)
#   dataset.events_start_date — first trade date of the SCORING window
#                               (also the rolling-window anchor: training = start_date − window)
#   dataset.events_end_date   — last trade date of the scoring window
#
# All output paths auto-date from events_start_date (YYYYMMDD suffix).
# rolling_window_weeks controls how far back training data is drawn.
#
# See CLAUDE.md → "Rolling Window Design" for the full workflow.
# ============================================================

rolling_window_weeks:   14            # Training window in weeks (try 16 for more data)

# ============================================================
# Single dataset — all option data in one folder, no sub-folders
# ============================================================
dataset:
  data_dir:             "option/put"              # all raw snapshot CSVs live here
  data_basic_csv:       "trades_raw_current.csv"  # intermediate raw merge written by a01
  output_csv:           "labeled_trades_current.csv"  # labeled output written by a04
  cutoff_date:          "2025-11-15"              # ← update when you have new data
  events_start_date:    "2025-10-27"              # ← update: first day of scoring window
  events_end_date:      "2025-11-07"              # ← update: last day of scoring window
  events_output:        "output/data_prep/corp_events/events_current.csv"
  tickers_file:         "output/data_prep/corp_events/symbols_in_option_data_current.txt"
  filtered_trades_csv:  "output/filtered/trades_filtered_current.csv"
  filtered_out_csv:     "output/filtered/trades_excluded_current.csv"

# ============================================================
# Output directory layout
# ============================================================
common:
  output_dir: "output"
  data_prep:  "data_prep"
  labeled:    "data_labeled"

# ============================================================
# Raw data / snapshot settings  (a01_build_features)
# ============================================================
data:
  glob:           "coveredPut_*.csv"
  target_time:    "11:00"
  batch_size:     30
  all_snapshots:  0
  refresh_cache:  0
  cache_dir:      "output"

# ============================================================
# GEX feature settings
# ============================================================
gex:
  base_dir:    "gex101"
  target_time: "11:00"
  filter:      0

# ============================================================
# VIX and macro price settings
# ============================================================
macro:
  vix_csv:     "output/vix_data.csv"
  px_base_dir: "output/price_cache"

# ============================================================
# Earnings calendar (optional enrichment)
# ============================================================
fundamentals:
  earnings_csv: "output/symbol_info/earnings_calendar.csv"

# ============================================================
# Winner Classifier training  (b01_train_winner)
#
# Template paths — {active_train_profile} is resolved automatically.
# ============================================================
winner:
  # {active_score_date} resolves to events_start_date of active_score_dataset (YYYYMMDD)
  # {rolling_window_weeks} resolves to the integer window size above
  input:       "output/data_merged/merged_roll{rolling_window_weeks}w_{active_score_date}.csv"
  output_dir:  "output/winner_train/v9_roll{rolling_window_weeks}w_{active_score_date}/"

  train_target:           "return_mon"   # return_mon | return_ann | return_pct
  model_type:             "lgbm"         # lgbm | catboost | rf
  train_epsilon:          0.02

  # Label mode: bins4 (default) trains a 4-class multiclass classifier (bin 0=worst, 3=best).
  # Use "binary" only for comparison experiments.
  label_mode:             "bins4"        # bins4 (default) | binary
  bins_mode:              "per_day"      # per_day (quartiles within each trade date) | global
  bins_q:                 "[0.25,0.5,0.75]"   # 3 cut-points → 4 bins
  bins_min_group:         20             # min trades per day to compute stable quartiles
  time_col:               "captureTime"  # column used for per_day grouping

  model_name:             "winner_classifier_model"   # suffix _{date}_{type}.pkl added by b01

  # Cross-validation
  oof_folds:              5
  time_series:            1              # 1=TimeSeries, 0=Stratified, auto=detect

  # Early stopping (gradient boosting only)
  early_stopping_rounds:  100
  valid_fraction:         0.1

  # Sample weighting
  use_weights:            1
  weight_alpha:           0.08
  weight_min:             0.5
  weight_max:             10.0

  # Missing value handling (1=median impute on train split; 0=drop rows)
  impute_missing:         1

  # Evaluation targets (comma-separated)
  target_precision:       "0.88,0.92"
  target_recall:          ""

  # RF-specific (ignored for lgbm/catboost)
  classifier_n_estimators: 400
  class_weight:            "balanced_subsample"
  max_depth:               ""
  min_samples_leaf:        1
  min_samples_split:       2

  id_cols: "symbol,tradeTime,return_pct,return_mon,return_ann,daysToExpiration"
  test_size:    0.3
  random_state: 42

# ============================================================
# Winner Classifier scoring  (b02_score_winner)
#
# Template paths resolved from active_* variables.
# ============================================================
winnerscore:
  # score_input: labeled CSV for the score batch  ({active_score_labeled_csv} resolves
  #              to the output_csv field of active_score_dataset's config entry)
  score_input:      "output/data_labeled/{active_score_labeled_csv}"
  model_in:         "output/winner_train/v9_roll{rolling_window_weeks}w_{active_score_date}/winner_classifier_model_{active_score_date}_{model_type}.pkl"
  score_out_folder: "output/winner_score/v9_roll{rolling_window_weeks}w_{active_score_date}"
  score_out:        "scores_{active_score_date}.csv"

  proba_col: "win_proba"
  pred_col:  "win_predict"

  split_file: "winner_scores_split.csv"
  oof_file:   ""

  # Threshold selection
  threshold:         ""      # fixed numeric override (empty = auto)
  use_pack_best_f1:  1       # use best-F1 threshold from training pack
  target_precision:  0.90    # if auto_calibrate=1, pick threshold ≥ this precision
  target_recall:     ""
  auto_calibrate:    1       # 1 = data-driven threshold (requires labels in scored CSV)

# ============================================================
# Tail Loss Classifier training  (b03_train_tail.py)
#
# DEPENDENCY: b01_train_winner.py must run first.
# b03 loads winner_scores_oof.csv (bins4 format) from the winner output directory
# and uses the 4-bin OOF probabilities (p_bin0-3) as features.
#
# Labeling: tail = 1 when y_true == 0 (actual return in worst quartile / bin-0).
# CV: reuses the winner fold structure (same fold column from winner_scores_oof.csv).
# ============================================================
tail:
  # Same rolling-window dataset as b01
  input:       "output/data_merged/merged_roll{rolling_window_weeks}w_{active_score_date}.csv"
  output_dir:  "output/tails_train/v9_roll{rolling_window_weeks}w_{active_score_date}/"

  # Path to the winner OOF scores file produced by b01 (bins4 format required)
  winner_oof_csv: "output/winner_train/v9_roll{rolling_window_weeks}w_{active_score_date}/winner_scores_oof.csv"

  model_name:    "tail_classifier_model"   # suffix _{date}.pkl added by b03
  with_earnings: 1    # 1 = include is_earnings_week / is_earnings_window if present

# ============================================================
# Tail Loss Classifier scoring  (b04_score_tail.py)
#
# Template paths resolved from active_score_date and rolling_window_weeks.
# ============================================================
tailscoring:
  score_input:      "output/data_labeled/{active_score_labeled_csv}"
  # Tail model: produced by b03
  model_in:         "output/tails_train/v9_roll{rolling_window_weeks}w_{active_score_date}/tail_classifier_model_{active_score_date}.pkl"
  # Winner model: required to compute p_bin0-3 features before tail scoring
  winner_model_in:  "output/winner_train/v9_roll{rolling_window_weeks}w_{active_score_date}/winner_classifier_model_{active_score_date}_{model_type}.pkl"
  score_out_folder: "output/tails_score/v9_roll{rolling_window_weeks}w_{active_score_date}"
  score_out:        "tail_scores_{active_score_date}.csv"
  proba_col:        "tail_proba"
  pred_col:         "is_tail_pred"
  threshold:        ""             # empty = use best-F1 threshold from model pack
  target_precision: ""             # optional: auto-select threshold at this precision
  target_recall:    ""             # optional: auto-select threshold at this recall

# ============================================================
# Evaluation  (eval/eval_classifier.py)
# ============================================================
evaluation:
  # Point at any scored CSV — winner or tail — then adjust proba_col and label_mode
  input:           "output/winner_score/v9_roll{rolling_window_weeks}w_{active_score_date}/scores_{active_score_date}.csv"
  output_dir:      "output/eval/v9_roll{rolling_window_weeks}w_{active_score_date}/"
  proba_col:       "win_proba"   # or "tail_proba" for tail evaluation
  fixed_thresholds: ""
  target_recall:   "0.86,0.92"
  label_mode:      "winner"      # winner | tail_pct | tail_pnl | provided
  tail_k:          0.05
  label_col:       ""
  return_col:      "return_mon"
  split_col:       "is_train"
  filter_query:    ""
  group_cols:      "daysToExpiration"

# ============================================================
# General / shared settings
# ============================================================
general:
  symbol_col:         "baseSymbol"
  trade_date_col:     "trade_date"
  drop_duplicates:    true
  strict_length_check: true

# ============================================================
# Pipeline flags
# ============================================================
process_on_fly: 0
write_sweep:    1
