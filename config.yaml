# ============================================================
# Output directory layout
# ============================================================
common:
  output_dir: "output"
  data_prep:  "data_prep"
  labeled:    "data_labeled"

# ============================================================
# Raw data / snapshot settings  (a01_build_features)
# ============================================================
data:
  glob:           "coveredPut_*.csv"
  target_time:    "11:00"
  batch_size:     30
  all_snapshots:  0
  refresh_cache:  0
  cache_dir:      "output"

# ============================================================
# GEX feature settings
# ============================================================
gex:
  base_dir:    "gex101"
  target_time: "11:00"
  filter:      0

# ============================================================
# VIX and macro price settings
# ============================================================
macro:
  vix_csv:     "output/vix_data.csv"
  px_base_dir: "output/price_cache"

# ============================================================
# Earnings calendar (optional enrichment)
# ============================================================
fundamentals:
  earnings_csv: "output/symbol_info/earnings_calendar.csv"

# ============================================================
# Winner Classifier training  (b01_train_winner)
#
# Template paths — {active_train_profile} is resolved automatically.
# ============================================================
winner:
  input:       "output/data_labeled/labeled_merged_with_gex_macro_{active_train_profile}.csv"
  output_dir:  "output/winner_train/v9_oof_{active_train_profile}/"

  train_target:           "return_mon"   # return_mon | return_ann | return_pct
  model_type:             "lgbm"         # lgbm | catboost | rf
  train_epsilon:          0.02

  model_name:             "winner_classifier_v9"

  # Cross-validation
  oof_folds:              5
  time_series:            1              # 1=TimeSeries, 0=Stratified, auto=detect

  # Early stopping (gradient boosting only)
  early_stopping_rounds:  100
  valid_fraction:         0.1

  # Sample weighting
  use_weights:            1
  weight_alpha:           0.08
  weight_min:             0.5
  weight_max:             10.0

  # Missing value handling (1=median impute on train split; 0=drop rows)
  impute_missing:         1

  # Evaluation targets (comma-separated)
  target_precision:       "0.88,0.92"
  target_recall:          ""

  # RF-specific (ignored for lgbm/catboost)
  classifier_n_estimators: 400
  class_weight:            "balanced_subsample"
  max_depth:               ""
  min_samples_leaf:        1
  min_samples_split:       2

  id_cols: "symbol,tradeTime,return_pct,return_mon,return_ann,daysToExpiration"
  test_size:    0.3
  random_state: 42

# ============================================================
# Winner Classifier scoring  (b02_score_winner)
#
# Template paths resolved from active_* variables.
# ============================================================
winnerscore:
  score_input:      "output/data_labeled/labeled_trades_with_gex_macro_{active_score_dataset}.csv"
  model_in:         "output/winner_train/v9_oof_{active_train_profile}/winner_classifier_model_{active_train_profile}_lgbm.pkl"
  score_out_folder: "output/winner_score/v9_model_{active_train_profile}"
  score_out:        "scores_winner_lgbm_{active_score_dataset}.csv"

  proba_col: "win_proba"
  pred_col:  "win_predict"

  split_file: "winner_scores_split.csv"
  oof_file:   ""

  # Threshold selection
  threshold:         ""      # fixed numeric override (empty = auto)
  use_pack_best_f1:  1       # use best-F1 threshold from training pack
  target_precision:  0.90    # if auto_calibrate=1, pick threshold ≥ this precision
  target_recall:     ""
  auto_calibrate:    1       # 1 = data-driven threshold (requires labels in scored CSV)

# ============================================================
# Tail Loss Model  (optional; staging/train_tail_with_gex.py)
# ============================================================
tail:
  out_dir:           "output/tails_train/v6b_we"
  model_out:         "tail_model_gex_v6b_ne_cut05.pkl"
  imp_out:           "tail_gex_v6b_ne_cut05_feature_importances.csv"
  scores_out:        "tail_gex_v6b_ne_cut05_scores_oof.csv"
  metrics_out:       "tail_train_metrics_v6b_ne_cut05.json"
  save_scores_sample: 40000
  label_on:          "per_month"    # raw | annualized | per_month
  pct:               0.05           # worst fraction by dollar PnL
  cv_type:           "stratified"   # stratified | time
  folds:             8
  seed:              42
  out_dir_general:   "output"

tail_scoring:
  score_input:    "output/labeled_trades_enriched2.csv"
  score_out:      "output/tails_score/scored_with_tail_pct_mon_cut5_new.csv"
  keep_proba_col: "tail_proba"
  pred_col:       "is_tail_preda"
  threshold:      0.030

# ============================================================
# Evaluation  (eval/eval_classifier.py)
# ============================================================
evaluation:
  input:           "output/tails_score/scored_with_tail_pct_mon_cut5_new.csv"
  output_dir:      "output/eval/tail_scored/"
  proba_col:       "tail_proba"
  fixed_thresholds: ""
  target_recall:   "0.86,0.92"
  label_mode:      "tail_pct"    # winner | tail_pct | tail_pnl | provided
  tail_k:          0.05
  label_col:       ""
  return_col:      "return_mon"
  split_col:       "is_train"
  filter_query:    ""
  group_cols:      "daysToExpiration"

# ============================================================
# General / shared settings
# ============================================================
general:
  symbol_col:         "baseSymbol"
  trade_date_col:     "trade_date"
  drop_duplicates:    true
  strict_length_check: true

# ============================================================
# Rescue model (experimental; staging/)
# ============================================================
rescue:
  out: "output/rescue_tail/v2d"

# ============================================================
# Pipeline flags
# ============================================================
process_on_fly: 0
write_sweep:    1
