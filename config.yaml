# ============================================================
# CSP ML Pipeline — Unified Configuration
# ============================================================
#
# Change only these 3 lines to control the entire pipeline:
#
#   active_train_profile   — which merged dataset to train on
#   active_score_dataset   — which dataset to score
#   active_process_dataset — which dataset a01/a02/a03 should process
#
# Valid dataset tags: orig, a, b, c, d, e, f  (add more in common_configs below)
# ============================================================

active_train_profile:   "origabcde"   # Training:   orig | origa | origab | … | origabcde
active_score_dataset:   "f"           # Scoring:    a | b | c | d | e | f
active_process_dataset: "f"           # Processing (a01/a02/a03): orig | a | b | … | f

